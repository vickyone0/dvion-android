name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node / JS ──────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JS dependencies
        run: npm install

      # ── Java ───────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Android SDK + NDK ──────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and build tools
        run: |
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.3.13750724"

      # ── Rust cross-compilation ─────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-bridge -> target

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust JNI library
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.3.13750724"
          cd rust-bridge

          cargo ndk --target aarch64-linux-android --platform 26 -- build --release
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libdvion_jni.so \
             ../android/app/src/main/jniLibs/arm64-v8a/

          cargo ndk --target x86_64-linux-android --platform 26 -- build --release
          mkdir -p ../android/app/src/main/jniLibs/x86_64
          cp target/x86_64-linux-android/release/libdvion_jni.so \
             ../android/app/src/main/jniLibs/x86_64/

      # ── Bundle React Native JS ─────────────────────────────
      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      # ── Gradle ─────────────────────────────────────────────
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10.2

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2 --project-dir android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # ── Upload artifact ────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dvion-vpn-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
